name: Build AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web
        env:
          VITE_REVENUECAT_API_KEY_ANDROID: ${{ secrets.REVENUECAT_API_KEY_ANDROID }}
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTOREBASE64 }}" | base64 --decode > android/app/financeapp-release.keystore

      - name: Build AAB (signed release)
        env:
          KEYSTORE_PATH: financeapp-release.keystore
          KEYSTOREPASSWORD: ${{ secrets.KEYSTOREPASSWORD }}
          KEYALIAS: ${{ secrets.KEYALIAS }}
          KEYPASSWORD: ${{ secrets.KEYPASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Cleanup keystore
        if: always()
        run: rm -f android/app/financeapp-release.keystore

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-app-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
